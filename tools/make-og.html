<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>OG 이미지 생성기</title>
<style>body{margin:0;background:#111;color:#eee;font-family:system-ui}canvas{max-width:100%;display:block;margin:12px auto}</style>
</head><body>
<canvas id="c" width="1200" height="630"></canvas>
<script>
const COLORS = {
  red:['#e64b4b','#a32b2b'], blue:['#3a6fe0','#22449a'], green:['#2ea44f','#1a6b32'],
  pink:['#f06fbc','#b03d84'], yellow:['#f2d43d','#b39a12'], cyan:['#43d8e8','#1d95a3'],
  purple:['#8a4fd6','#5b2f94'], orange:['#f28c28','#b35f10'],
};
function duck(g, hex, dark, o = {}) {
  const { dead = false } = o;
  g.fillStyle = '#e08a20';
  g.beginPath(); g.ellipse(-6, 17, 5.5, 3.2, 0, 0, 6.283); g.fill();
  g.beginPath(); g.ellipse(6, 17, 5.5, 3.2, 0, 0, 6.283); g.fill();
  g.fillStyle = hex; g.strokeStyle = dark; g.lineWidth = 2.6;
  g.beginPath(); g.ellipse(0, 2, 15, 17, 0, 0, 6.283); g.fill(); g.stroke();
  g.fillStyle = 'rgba(255,255,255,.20)';
  g.beginPath(); g.ellipse(2, 7, 8.5, 9, 0, 0, 6.283); g.fill();
  g.fillStyle = dark; g.beginPath(); g.ellipse(-10, 4, 5, 9, 0.25, 0, 6.283); g.fill();
  g.fillStyle = hex; g.strokeStyle = dark; g.lineWidth = 2.4;
  g.beginPath(); g.arc(3, -13, 11, 0, 6.283); g.fill(); g.stroke();
  g.fillStyle = '#f2a02c'; g.strokeStyle = '#c47b12'; g.lineWidth = 1.6;
  g.beginPath(); g.ellipse(13, -11, 7, 4.2, 0, 0, 6.283); g.fill(); g.stroke();
  g.fillStyle = '#fff'; g.beginPath(); g.ellipse(6, -16, 4.4, 5, 0, 0, 6.283); g.fill();
  if (dead) { g.strokeStyle = '#222'; g.lineWidth = 1.8;
    g.beginPath(); g.moveTo(3.5,-18.5); g.lineTo(8.5,-13.5); g.moveTo(8.5,-18.5); g.lineTo(3.5,-13.5); g.stroke();
  } else {
    g.fillStyle = '#151824'; g.beginPath(); g.arc(7.2, -15.6, 2.3, 0, 6.283); g.fill();
    g.fillStyle = 'rgba(255,255,255,.9)'; g.beginPath(); g.arc(8, -16.6, 0.9, 0, 6.283); g.fill();
  }
}
const c = document.getElementById('c'), g = c.getContext('2d');
const W = 1200, H = 630;

// 배경
const bg = g.createLinearGradient(0, 0, W, H);
bg.addColorStop(0, '#0a1428'); bg.addColorStop(.55, '#070d1c'); bg.addColorStop(1, '#12091f');
g.fillStyle = bg; g.fillRect(0, 0, W, H);
// 별
for (let i = 0; i < 260; i++) {
  const x = (i * 977) % W, y = (i * 613) % H, r = ((i * 31) % 10) / 10 * 1.9 + .3;
  g.fillStyle = `rgba(255,255,255,${.12 + ((i * 17) % 60) / 160})`;
  g.beginPath(); g.arc(x, y, r, 0, 6.283); g.fill();
}
// 좌측 상단 광원
const glow = g.createRadialGradient(210, 150, 20, 210, 150, 460);
glow.addColorStop(0, 'rgba(95,208,255,.18)'); glow.addColorStop(1, 'rgba(95,208,255,0)');
g.fillStyle = glow; g.fillRect(0, 0, W, H);

// 타이틀
g.textAlign = 'left'; g.textBaseline = 'alphabetic';
g.font = '900 116px "Pretendard","Apple SD Gothic Neo",system-ui,sans-serif';
const tg = g.createLinearGradient(78, 180, 78, 300);
tg.addColorStop(0, '#ffffff'); tg.addColorStop(1, '#7fc4ff');
g.fillStyle = tg;
g.fillText('덕몽어스', 78, 268);

g.font = '700 33px "Pretendard","Apple SD Gothic Neo",system-ui,sans-serif';
g.fillStyle = '#9fb6d8';
g.fillText('링크 하나로 하는 오리 마피아', 82, 322);

g.font = '600 25px "Pretendard","Apple SD Gothic Neo",system-ui,sans-serif';
g.fillStyle = '#6d84a8';
g.fillText('설치 없이 브라우저에서 바로 · 최대 16명', 82, 364);

// 배지
const badges = ['🎭 직업 22종', '🧰 임무 18종', '💥 사보타주', '💬 퀵챗·동선기록'];
let bx = 80;
g.font = '700 22px "Pretendard",system-ui,sans-serif';
badges.forEach(t => {
  const w = g.measureText(t).width + 34;
  g.fillStyle = 'rgba(60,95,150,.30)';
  g.beginPath(); g.roundRect(bx, 410, w, 46, 23); g.fill();
  g.strokeStyle = 'rgba(120,180,255,.42)'; g.lineWidth = 1.6; g.stroke();
  g.fillStyle = '#cfe2ff';
  g.fillText(t, bx + 17, 440);
  bx += w + 13;
});

// 오리들 (오른쪽)
const cast = [
  { c:'red',    x: 830, y: 235, s: 3.4, r:-.10 },
  { c:'blue',   x: 985, y: 190, s: 2.9, r: .09 },
  { c:'yellow', x:1105, y: 268, s: 2.6, r:-.06 },
  { c:'green',  x: 915, y: 360, s: 2.7, r: .07 },
  { c:'purple', x:1058, y: 420, s: 2.4, r:-.12, dead:true },
];
cast.forEach(d => {
  const [hex, dark] = COLORS[d.c];
  g.save();
  g.translate(d.x, d.y); g.rotate(d.r); g.scale(d.s, d.s);
  g.fillStyle = 'rgba(0,0,0,.45)';
  g.beginPath(); g.ellipse(0, 20, 16, 5.5, 0, 0, 6.283); g.fill();
  duck(g, hex, dark, { dead: d.dead });
  g.restore();
});

// 하단 바
g.fillStyle = 'rgba(0,0,0,.30)'; g.fillRect(0, H - 62, W, 62);
g.font = '700 24px "Pretendard",system-ui,sans-serif';
g.fillStyle = '#8fa2c4';
g.fillText('🦆  거위인가, 오리인가 — 카카오톡에 링크만 붙여넣으세요', 80, H - 24);

window.__png = c.toDataURL('image/png');
document.title = 'OG 준비완료 ' + Math.round(window.__png.length / 1024) + 'KB';
</script>
</body></html>
